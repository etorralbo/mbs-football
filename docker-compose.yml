services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run ONCE on fresh volume creation (docker-entrypoint-initdb.d).
      # To re-run: docker compose down -v && docker compose up -d db
      - ./backend/docker/postgres-init:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      ENV: local
      AI_STUB: ${AI_STUB:-true}
      AI_ENABLED: ${AI_ENABLED:-true}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWT_AUD: ${SUPABASE_JWT_AUD:-authenticated}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      # Inside Docker, "localhost" resolves to the container itself.
      # Use the backend service name so Docker's DNS routes to the right container.
      # When running `npm run dev` locally, frontend/.env.local overrides this with http://localhost:8000.
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:

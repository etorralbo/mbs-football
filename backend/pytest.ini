[pytest]
# Pytest configuration for backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    auth: Authentication and authorization tests
    integration: Integration tests
    unit: Unit tests
    slow: Slow-running tests
    no_db: Tests that do not require a database connection

# Environment variables for tests (ENV also set in .env.test via python-dotenv)
env =
    ENV=test
